<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能销售单生成器 - 干净导出版</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        body {
            background: #eef2f5;
            font-family: 'Segoe UI', '微软雅黑', Roboto, sans-serif;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .invoice-container {
            position: relative;
            max-width: 1280px;
            width: 100%;
            background: white;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 24px 28px 36px 28px;
            margin-bottom: 24px;
            overflow: visible;
            user-select: none;
        }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .invoice-container { box-shadow: none; padding: 0.2in; margin: 0; border-radius: 0; }
            .btn-group, .control-panel, .remark-box button { display: none !important; }
        }
        .brand-overlay {
            position: absolute;
            z-index: 20;
            cursor: grab;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            opacity: 0.9;
            user-select: none;
            touch-action: none;
        }
        .brand-overlay.dragging, .company-stamp.dragging {
            cursor: grabbing;
            opacity: 0.7;
        }
        .sign-line {
            position: relative;
            flex-shrink: 0;
            font-size: 14px;
            display: inline-block;
            padding: 4px 8px;
            min-width: 160px;
            white-space: nowrap;
        }
        .company-stamp {
            position: absolute;
            object-fit: contain;
            opacity: 0.85;
            z-index: 10;
            cursor: grab;
            background: transparent;
            pointer-events: auto;
            touch-action: none;
        }
        .control-panel {
            max-width: 1280px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            padding: 20px 28px;
            margin-bottom: 20px;
            border: 1px solid #e2edf2;
        }
        .info-edit-panel {
            background: #fefcf5;
            border-radius: 28px;
            padding: 18px 24px;
            margin-bottom: 20px;
            border: 1px solid #e9e5d5;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(115px, 130px));
            gap: 14px 18px;
            align-items: end;
        }
        .info-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .info-field label {
            font-size: 11px;
            font-weight: 600;
            color: #4a627a;
            letter-spacing: 0.3px;
        }
        .info-field input {
            padding: 6px 10px;
            border-radius: 26px;
            border: 1px solid #cddfe7;
            font-size: 12px;
            background: white;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
            width: 100%;
        }
        .info-field input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        .add-goods-bar {
            background: #fefcf5;
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            border: 1px solid #e9e5d5;
            margin-bottom: 16px;
        }
        .add-goods-bar input, .add-goods-bar select {
            padding: 8px 14px;
            border-radius: 32px;
            border: 1px solid #cddfe7;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            background: white;
        }
        .action-bar {
            background: #fefcf5;
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            border: 1px solid #e9e5d5;
            margin-bottom: 16px;
        }
        .btn-sm {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 32px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-sm-danger { background: #bc6c25; }
        .btn-sm:hover { background: #1f5e7a; }
        .btn-sm-danger:hover { background: #9e561a; }
        .action-icon-btn {
            background: #eef2f7;
            border: 1px solid #cbd5e1;
            color: #1e4663;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 32px;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-icon-btn:hover {
            background: #e2e8f0;
            border-color: #2c7da0;
        }
        .action-icon-btn.danger {
            color: #bc6c25;
            border-color: #f1d5b5;
        }
        .action-icon-btn.danger:hover {
            background: #fff1e6;
        }
        .action-icon-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            background: #f1f5f9;
        }
        .batch-parse {
            margin-top: 8px;
            padding: 16px 20px;
            background: #f9fafb;
            border-radius: 28px;
            border: 1px solid #e2edf2;
        }
        .batch-title { font-weight: 700; color: #1e4663; margin-bottom: 12px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .batch-textarea { width: 100%; padding: 12px 16px; border-radius: 20px; border: 1px solid #cbd5e1; font-family: monospace; font-size: 13px; resize: vertical; background: white; }
        .batch-preview { background: #ffffff; border-radius: 20px; margin-top: 12px; padding: 12px; border: 1px solid #e2e8f0; max-height: 200px; overflow-y: auto; }
        .preview-item { background: #f1f5f9; border-radius: 40px; padding: 6px 14px; margin: 6px 0; font-size: 13px; display: inline-block; margin-right: 8px; }
        .batch-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 12px; }
        .btn-outline { background: transparent; border: 1px solid #2c7da0; color: #2c7da0; padding: 6px 16px; border-radius: 32px; font-weight: bold; cursor: pointer; }
        .btn-outline:hover { background: #eef2ff; }

        .table-wrapper { border-radius: 18px; overflow-x: auto; border: 2px solid #1e2f3a; background: #fff; margin-top: 8px; }
        .sales-table { width: 100%; border-collapse: collapse; font-size: 13.5px; font-family: 'Segoe UI', 'Consolas', monospace; min-width: 650px; }
        .sales-table th, .sales-table td { border: 2px solid #1e2f3a; padding: 10px 8px; vertical-align: middle; text-align: center; }
        .sales-table th { background-color: #e6eaef; font-weight: 800; }
        .clickable-seq {
            cursor: pointer;
            background-color: #f0f7ff;
            font-weight: 600;
            transition: 0.1s;
        }
        .clickable-seq:hover { background-color: #d9e8ff; }
        .selected-row td:first-child { background-color: #cce5ff; font-weight: bold; }
        .selected-row { background-color: #f0f7ff; }

        .header-info {
            text-align: center;
            margin-bottom: 16px;
        }
        .company-title { font-size: 28px; font-weight: 800; color: #0b3b4f; margin-bottom: 6px; }
        .sub-title { font-size: 13px; color: #2c3e50; }
        .title-divider {
            border-bottom: 3px solid #1a4d6b;
            margin-bottom: 16px;
        }
        .meta-row {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            background: #f4f7fa;
            padding: 12px 20px;
            border-radius: 16px;
            margin: 18px 0 16px 0;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #bac8d3;
            gap: 16px;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
        }
        .meta-item:first-child {
            flex: 5;
            min-width: 0;
            justify-content: flex-start;
        }
        .meta-item:first-child .static-text {
            background: transparent;
            border: none;
            padding: 0;
            font-weight: 700;
            color: #1e4663;
            white-space: normal;
            word-break: break-word;
            font-size: 15px;
            max-width: 100%;
            line-height: 1.4;
        }
        .meta-item:last-child {
            flex: 0 0 auto;
            justify-content: center;
        }
        .static-text {
            background: white;
            padding: 5px 14px;
            border-radius: 28px;
            font-weight: 500;
            display: inline-block;
            border: 1px solid #b9cad6;
            color: #1f3b4c;
            white-space: nowrap;
        }
        .total-row {
            margin-top: 20px;
            background: #fef3e0;
            padding: 12px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-left: 4px solid #c9822b;
            border: 1px solid #e2bc84;
        }
        .total-left {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .total-left strong {
            font-size: 14px;
            white-space: nowrap;
        }
        .amount-chinese {
            font-size: 18px;
            font-weight: 800;
            color: #b45f1b;
            background: #fff8ed;
            padding: 4px 14px;
            border-radius: 32px;
            border: 1px solid #d69546;
            font-family: '楷体', 'Microsoft YaHei', monospace;
            letter-spacing: 1px;
        }
        .total-right {
            font-size: 24px;
            color: #c0392b;
            background: white;
            padding: 4px 18px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: 800;
            border: 1px solid #bb7a3a;
            white-space: nowrap;
        }
        
        .sign-stamp {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 30px;
            border-top: 2px solid #3c5a6f;
            padding-top: 20px;
            gap: 32px;
            flex-wrap: nowrap;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
        }
        .sign-date {
            flex-shrink: 0;
            font-size: 14px;
            white-space: nowrap;
        }
        .sign-line {
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        .remark-box { background: #fef0da; padding: 10px 16px; border-radius: 14px; margin: 18px 0 6px; font-size: 13px; color: #a15813; border: 1px solid #e2b87a; display: flex; align-items: center; justify-content: flex-start; gap: 12px; flex-wrap: wrap; }
        .btn-group { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        button { background: #2c7da0; border: none; color: white; font-size: 16px; padding: 10px 28px; border-radius: 48px; cursor: pointer; font-weight: bold; }
        .btn-print { background: #5f6c7a; }
        .btn-pdf { background: #d9534f; }
        .footer-note { text-align: center; margin-top: 14px; font-size: 12px; color: #4a5568; border-top: 1px dashed #bbb; padding-top: 8px; }
        
        .size-control {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 5px 12px;
            border-radius: 32px;
            margin-left: 12px;
        }
        .size-control input {
            width: 70px;
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid #cddfe7;
            font-size: 12px;
            text-align: center;
        }
        .size-control span {
            font-size: 12px;
            color: #4a627a;
        }
        @media (max-width: 860px) {
            .meta-row { gap: 12px; padding: 10px 16px; }
            .meta-item:first-child .static-text { font-size: 13px; }
            .info-edit-panel { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .add-goods-bar, .action-bar { gap: 8px; }
            .size-control { margin-left: 0; margin-top: 8px; }
            .total-row { padding: 10px 16px; }
            .amount-chinese { font-size: 16px; padding: 3px 12px; }
            .total-right { font-size: 20px; padding: 3px 14px; }
            .sign-stamp { gap: 16px; }
        }
    </style>
</head>
<body>

<div class="invoice-container" id="invoiceContainer">
    <img id="brandImage" class="brand-overlay" src="" alt="品牌图" style="display: none;">
    
    <div class="header-info">
        <div class="company-title" id="companyTitle">XXX科技有限公司销售单</div>
        <div class="sub-title" id="contactInfo">联系电话：000-000000 &nbsp;|&nbsp; 联系人：某某某</div>
    </div>
    <div class="title-divider"></div>

    <div class="meta-row">
        <div class="meta-item"><strong>收货单位：</strong><span id="customerNameDisplay" class="static-text">XXX单位</span></div>
        <div class="meta-item"><strong>单据编号：</strong><span id="invoiceNo" class="static-text"></span></div>
    </div>
    <div class="table-wrapper">
        <table class="sales-table" id="salesTable">
            <thead><tr><th style="width:50px">序号</th><th>名称</th><th style="width:70px">单位</th><th style="width:80px">数量</th><th style="width:80px">单价(元)</th><th style="width:90px">金额(元)</th><th>备注/类别</th></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="total-row">
        <div class="total-left">
            <strong>合计(大写):</strong> <span id="amountCN" class="amount-chinese">零元整</span>
        </div>
        <div class="total-right">
            ￥ <span id="amountTotal">0.00</span>
        </div>
    </div>
    <div class="remark-box"><strong>备  注：</strong> <span id="remarkText">请填写备注信息</span><button id="editRemarkBtn" style="background: transparent; color: #b45f1b; font-size: 12px; padding: 4px 12px; border: 1px solid #e2b87a; border-radius: 40px;">✎ 编辑</button></div>
    
    <div class="sign-stamp">
        <div class="sign-date">开单日期：<span id="footerInvoiceDate"></span></div>
        <div class="sign-line" id="signerContainer">
            <span id="signerName">制单人：某某某</span>
            <img id="companyStamp" class="company-stamp" src="" alt="公司章" style="display: none;">
        </div>
    </div>
    <div class="footer-note">本销售单盖章有效 | 电子单据与纸质同等效力</div>
</div>

<div class="control-panel">
    <div class="info-edit-panel">
        <div class="info-field"><label>🏢 公司名称</label><input type="text" id="editCompany" value="XXX科技有限公司销售单"></div>
        <div class="info-field"><label>📞 联系电话</label><input type="text" id="editPhone" value="000-000000"></div>
        <div class="info-field"><label>👤 联系人</label><input type="text" id="editContact" value="某某某"></div>
        <div class="info-field"><label>✍️ 制单人</label><input type="text" id="editSigner" value="某某某"></div>
        <div class="info-field"><label>🏪 收货单位</label><input type="text" id="editCustomer" value="XXX单位"></div>
    </div>

    <div class="add-goods-bar">
        <input type="text" id="prodName" placeholder="商品名称" style="width:130px;">
        <input type="text" id="prodUnit" placeholder="单位" style="width:70px;" value="个">
        <input type="number" id="prodQty" placeholder="数量" style="width:80px;" value="1" step="any" min="0.01">
        <input type="number" id="prodPrice" placeholder="单价" style="width:90px;" value="0.00" step="0.01" min="0">
        <input type="text" id="prodRemark" placeholder="备注" style="width:110px;">
        <button id="addItemBtn" class="btn-sm">➕ 添加商品</button>
    </div>

    <div class="action-bar">
        <button id="moveUpBtn" class="action-icon-btn"><i>↑</i> 上移</button>
        <button id="moveDownBtn" class="action-icon-btn"><i>↓</i> 下移</button>
        <button id="deleteSelectedBtn" class="action-icon-btn danger"><i>🗑️</i> 删除</button>
        <button id="clearAllBtn" class="btn-sm btn-sm-danger">🗑️ 清空全部</button>
        <button id="loadEditBtn" class="action-icon-btn">📋 加载选中商品</button>
        <button id="saveEditBtn" class="btn-sm" style="background:#2c7da0;">💾 保存修改</button>
    </div>

    <div style="margin: 16px 0 8px 0; border-top: 1px solid #e2edf2; padding-top: 16px;">
        <div style="font-weight: 600; margin-bottom: 12px; color: #1e4663;">📎 图片管理（手指/鼠标拖拽移动位置）</div>
        <div style="display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 20px;">
            <div style="background: #f9fafb; padding: 12px 16px; border-radius: 28px; flex: 1; min-width: 260px;">
                <div style="font-weight: 600; margin-bottom: 8px;">🏢 品牌图</div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <button id="uploadBrandBtn" class="btn-sm" style="background:#5f6c7a;">上传品牌图</button>
                    <button id="removeBrandBtn" class="btn-sm" style="background:#bc6c25;">移除</button>
                    <input type="file" id="brandInput" accept="image/*" style="display: none;">
                    <div class="size-control"><span>宽度(px):</span><input type="number" id="brandWidth" value="120" step="10" min="30" max="400"><button id="applyBrandSize" class="action-icon-btn" style="padding:2px 12px;">应用</button></div>
                </div>
            </div>
            <div style="background: #f9fafb; padding: 12px 16px; border-radius: 28px; flex: 1; min-width: 260px;">
                <div style="font-weight: 600; margin-bottom: 8px;">🖼️ 公司章</div>
                <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                    <button id="uploadStampBtn" class="btn-sm" style="background:#5f6c7a;">上传公司章</button>
                    <button id="removeStampBtn" class="btn-sm" style="background:#bc6c25;">移除</button>
                    <input type="file" id="stampInput" accept="image/*" style="display: none;">
                    <div class="size-control"><span>宽度(px):</span><input type="number" id="stampWidth" value="150" step="10" min="50" max="500"><button id="applyStampSize" class="action-icon-btn" style="padding:2px 12px;">应用</button></div>
                </div>
            </div>
        </div>
        <div class="footer-note" style="font-size: 11px; color: #888; margin-top: 8px;">💡 提示：刷新页面后图片不会保留，但商品数据、公司信息、备注会自动恢复。</div>
    </div>

    <div class="batch-parse">
        <div class="batch-title">🧠 精准批量解析 (自动识别数量/单位/单价/总价)</div>
        <textarea id="batchRawInput" rows="3" class="batch-textarea" placeholder="支持格式示例：
商品名称 数量 单位 单价     → 智能平板 3 台 2499
商品名称 数量单位 单价     → 网线 5根 2.8
商品名称 数量 单价         → 鼠标 10 25（单位默认为个）
商品名称 数量单位 总价     → 键盘 2个 160（自动计算单价80）
商品名称 总价             → 工费 600（数量默认为1）
支持小数数量，每行一个商品"></textarea>
        <div class="batch-preview" id="parsePreview"></div>
        <div class="batch-actions">
            <button id="parseBtn" class="btn-outline">🔍 智能解析预览</button>
            <button id="confirmAddBatchBtn" class="btn-sm" style="background:#2c7da0;">✓ 确认添加全部</button>
        </div>
    </div>
</div>

<div class="btn-group">
    <button class="btn-image" id="saveAsImageBtn">📷 保存为图片</button>
    <button class="btn-pdf" id="downloadPdfBtn">📄 下载 PDF</button>
    <button class="btn-print" id="printBtn">🖨️ 打印销售单</button>
</div>

<script>
    let items = []; 
    let selectedIndex = -1;
    const STANDARD_UNITS = new Set(['个','台','套','根','件','只','条','支','箱','包','瓶','盒','桶','双','对','米','千克','公斤','克','升','毫升','袋','卷','组','部','块','片','张','把','粒','罐','打','份','册','本','辆','架','顶','副','串','捆','扎','排','座','栋','扇','盏','枚','轴','码','英尺','英寸','厘米','毫米','GB','TB','张/包','个/箱','米/卷','台/套','箱/件','台/个','支/盒','卷/包','套/箱','项','次']);
    const CHINESE_NUM_MAP = { '一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10 };
    
    // ---------- 本地缓存（仅缓存非图片数据）----------
    const STORAGE_KEY = 'SmartSalesInvoiceData';
    function saveToLocalStorage() {
        try {
            const data = {
                items: items,
                selectedIndex: selectedIndex,
                company: document.getElementById('editCompany').value,
                phone: document.getElementById('editPhone').value,
                contact: document.getElementById('editContact').value,
                signer: document.getElementById('editSigner').value,
                customer: document.getElementById('editCustomer').value,
                remark: document.getElementById('remarkText').innerText
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch(e) {
            console.warn('保存缓存失败', e);
        }
    }
    
    function loadFromLocalStorage() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (data.items) { items = data.items; }
            if (typeof data.selectedIndex === 'number') selectedIndex = data.selectedIndex;
            if (data.company) document.getElementById('editCompany').value = data.company;
            if (data.phone) document.getElementById('editPhone').value = data.phone;
            if (data.contact) document.getElementById('editContact').value = data.contact;
            if (data.signer) document.getElementById('editSigner').value = data.signer;
            if (data.customer) document.getElementById('editCustomer').value = data.customer;
            if (data.remark) document.getElementById('remarkText').innerText = data.remark;
            
            syncEditableInfo();
            renderTable();
            return true;
        } catch(e) {
            console.warn('读取缓存失败', e);
            return false;
        }
    }
    
    // ---------- 图片拖拽（不保存位置到缓存）----------
    const brandImage = document.getElementById('brandImage');
    const brandInput = document.getElementById('brandInput');
    const uploadBrandBtn = document.getElementById('uploadBrandBtn');
    const removeBrandBtn = document.getElementById('removeBrandBtn');
    const brandWidthInput = document.getElementById('brandWidth');
    const applyBrandSizeBtn = document.getElementById('applyBrandSize');

    const companyStamp = document.getElementById('companyStamp');
    const stampInput = document.getElementById('stampInput');
    const uploadStampBtn = document.getElementById('uploadStampBtn');
    const removeStampBtn = document.getElementById('removeStampBtn');
    const stampWidthInput = document.getElementById('stampWidth');
    const applyStampSizeBtn = document.getElementById('applyStampSize');

    function makeDraggable(element, getStartPos, setPos) {
        let dragging = false;
        let startX = 0, startY = 0;
        let startLeft = 0, startTop = 0;

        function onStart(clientX, clientY) {
            if (!element.src || element.style.display === 'none') return;
            dragging = true;
            startX = clientX;
            startY = clientY;
            const pos = getStartPos();
            startLeft = pos.left;
            startTop = pos.top;
            element.classList.add('dragging');
            document.body.style.userSelect = 'none';
            document.body.style.touchAction = 'none';
        }

        function onMove(clientX, clientY) {
            if (!dragging) return;
            const dx = clientX - startX;
            const dy = clientY - startY;
            setPos(startLeft + dx, startTop + dy);
        }

        function onEnd() {
            if (dragging) {
                dragging = false;
                element.classList.remove('dragging');
                document.body.style.userSelect = '';
                document.body.style.touchAction = '';
            }
        }

        element.addEventListener('mousedown', (e) => { e.preventDefault(); onStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { onMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', onEnd);
        element.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; onStart(t.clientX, t.clientY); }, { passive: false });
        window.addEventListener('touchmove', (e) => { if(dragging) { e.preventDefault(); const t = e.touches[0]; onMove(t.clientX, t.clientY); } }, { passive: false });
        window.addEventListener('touchend', onEnd);
        window.addEventListener('touchcancel', onEnd);
    }

    function getBrandPos() {
        let left = parseFloat(brandImage.style.left);
        let top = parseFloat(brandImage.style.top);
        if (isNaN(left)) left = 20;
        if (isNaN(top)) top = 0;
        return { left, top };
    }
    function setBrandPos(left, top) {
        brandImage.style.left = left + 'px';
        brandImage.style.top = top + 'px';
    }
    
    function getStampPos() {
        if (companyStamp.style.transform === 'translate(-50%, -50%)' || !companyStamp.style.left || companyStamp.style.left === '50%') {
            const parentRect = companyStamp.parentElement.getBoundingClientRect();
            const rect = companyStamp.getBoundingClientRect();
            const left = rect.left - parentRect.left;
            const top = rect.top - parentRect.top;
            companyStamp.style.transform = 'none';
            companyStamp.style.left = left + 'px';
            companyStamp.style.top = top + 'px';
        }
        let left = parseFloat(companyStamp.style.left);
        let top = parseFloat(companyStamp.style.top);
        if (isNaN(left)) left = 50;
        if (isNaN(top)) top = 50;
        return { left, top };
    }
    function setStampPos(left, top) {
        companyStamp.style.transform = 'none';
        companyStamp.style.left = left + 'px';
        companyStamp.style.top = top + 'px';
    }
    
    function setBrandSize() { 
        let w = parseInt(brandWidthInput.value,10)||120; 
        brandImage.style.width = w + 'px'; 
        brandImage.style.height = 'auto';
    }
    function setStampSize() { 
        let w = parseInt(stampWidthInput.value,10)||150; 
        companyStamp.style.width = w + 'px'; 
        companyStamp.style.height = 'auto';
    }

    uploadBrandBtn.addEventListener('click',()=>brandInput.click());
    brandInput.addEventListener('change',(e)=>{ 
        const file=e.target.files[0]; 
        if(file && (file.type==='image/png'||file.type==='image/jpeg'||file.type==='image/jpg')){ 
            const reader=new FileReader(); 
            reader.onload=ev=>{ 
                brandImage.src=ev.target.result; 
                brandImage.style.display='inline-block'; 
                setBrandPos(20, 0); 
                setBrandSize(); 
            }; 
            reader.readAsDataURL(file); 
        } else alert('请上传JPG/PNG图片'); 
    });
    removeBrandBtn.addEventListener('click',()=>{ 
        brandImage.src=''; 
        brandImage.style.display='none'; 
        brandInput.value=''; 
    });
    applyBrandSizeBtn.addEventListener('click',setBrandSize);
    
    uploadStampBtn.addEventListener('click',()=>stampInput.click());
    stampInput.addEventListener('change',(e)=>{ 
        const file=e.target.files[0]; 
        if(file && (file.type==='image/png'||file.type==='image/jpeg')){ 
            const reader=new FileReader(); 
            reader.onload=ev=>{ 
                companyStamp.src=ev.target.result; 
                companyStamp.style.display='inline-block'; 
                companyStamp.style.transform = 'translate(-50%, -50%)'; 
                companyStamp.style.left = '50%'; 
                companyStamp.style.top = '50%'; 
                setStampSize(); 
            }; 
            reader.readAsDataURL(file); 
        } else alert('请上传JPG/PNG图片'); 
    });
    removeStampBtn.addEventListener('click',()=>{ 
        companyStamp.src=''; 
        companyStamp.style.display='none'; 
        stampInput.value=''; 
    });
    applyStampSizeBtn.addEventListener('click',setStampSize);
    
    makeDraggable(brandImage, getBrandPos, setBrandPos);
    makeDraggable(companyStamp, getStampPos, setStampPos);
    setBrandPos(20, 0);
    setBrandSize();
    companyStamp.style.transform = 'translate(-50%, -50%)';
    companyStamp.style.left = '50%';
    companyStamp.style.top = '50%';
    setStampSize();

    // ---------- 销售单核心逻辑（带自动保存）----------
    function syncEditableInfo() {
        document.getElementById('companyTitle').innerText = document.getElementById('editCompany').value || "销售单";
        document.getElementById('contactInfo').innerHTML = `联系电话：${document.getElementById('editPhone').value || ''} &nbsp;|&nbsp; 联系人：${document.getElementById('editContact').value || ''}`;
        document.getElementById('signerName').innerText = `制单人：${document.getElementById('editSigner').value || ''}`;
        document.getElementById('customerNameDisplay').innerText = document.getElementById('editCustomer').value || '';
        saveToLocalStorage();
    }
    function setInvoiceMeta() { 
        const d=new Date(); const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); 
        document.getElementById('footerInvoiceDate').innerText=`${y}-${m}-${day}`; 
        document.getElementById('invoiceNo').innerText=`XS-${y}${m}${day}-${Math.floor(Math.random()*1000)}`; 
    }
    function bindInfoEdits(){ ['editCompany','editPhone','editContact','editSigner','editCustomer'].forEach(id=>{ document.getElementById(id).addEventListener('input',syncEditableInfo); }); }
    function convertCurrency(money) { if(isNaN(money)) return '零元整'; let num=Math.round(parseFloat(money)*100)/100; let fraction=['角','分'], digit=['零','壹','贰','叁','肆','伍','陆','柒','捌','玖'], unit=[['元','万','亿'],['','拾','佰','仟']]; let head=num<0?'负':''; num=Math.abs(num); let s=''; for(let i=0;i<fraction.length;i++){ let temp=(Math.floor(num*10*Math.pow(10,i))%10).toString(); if(temp!=='0') s+=digit[parseInt(temp)]+fraction[i]; } let integerPart=Math.floor(num); if(integerPart===0){ return (s===''?'零元整':'零元'+s); } let p=0,strInt=''; while(integerPart>0){ let part=integerPart%10000; if(part!==0){ let partStr='',partNum=part,thousand=0; while(partNum>0){ let cur=partNum%10; if(cur!==0) partStr=digit[cur]+unit[1][thousand]+partStr; else if(partStr.length>0&&partStr[0]!=='零') partStr='零'+partStr; partNum=Math.floor(partNum/10); thousand++; } if(part<1000&&p>0&&strInt!==''&&strInt[0]!=='零') partStr='零'+partStr; strInt=partStr+(p===0?'':unit[0][p])+strInt; } p++; integerPart=Math.floor(integerPart/10000); } if(s==='') s='整'; return head+strInt+'元'+s; }
    function updateTotal(){ let total=items.reduce((sum,it)=>sum+it.qty*it.price,0); document.getElementById('amountTotal').innerText=total.toFixed(2); document.getElementById('amountCN').innerHTML=convertCurrency(total); return total; }
    function renderTable(){ 
        const tbody=document.getElementById('tableBody'); tbody.innerHTML=''; 
        if(items.length===0){ selectedIndex=-1; const row=tbody.insertRow(); row.insertCell(0).colSpan=7; row.cells[0].style.textAlign='center'; row.cells[0].style.padding='32px'; row.cells[0].innerText='✨ 暂无商品，请添加商品 ✨'; updateTotal(); updateButtonsState(); saveToLocalStorage(); return; }
        items.forEach((item,idx)=>{ const row=tbody.insertRow(); if(idx===selectedIndex) row.classList.add('selected-row'); const seqCell=row.insertCell(0); seqCell.innerText=idx+1; seqCell.className='clickable-seq'; seqCell.onclick=(e)=>{ e.stopPropagation(); selectedIndex=idx; renderTable(); }; row.insertCell(1).innerText=item.name; row.insertCell(2).innerText=item.unit; row.insertCell(3).innerText=item.qty; row.insertCell(4).innerText=item.price.toFixed(2); row.insertCell(5).innerText=(item.qty*item.price).toFixed(2); row.insertCell(6).innerText=item.remark||''; });
        updateTotal(); updateButtonsState(); saveToLocalStorage();
    }
    function updateButtonsState(){ const up=document.getElementById('moveUpBtn'),down=document.getElementById('moveDownBtn'),del=document.getElementById('deleteSelectedBtn'); const valid=(selectedIndex>=0 && selectedIndex<items.length && items.length>0); if(!valid){ up.classList.add('disabled'); down.classList.add('disabled'); del.classList.add('disabled'); } else { up.classList.remove('disabled'); down.classList.remove('disabled'); del.classList.remove('disabled'); if(selectedIndex===0) up.classList.add('disabled'); if(selectedIndex===items.length-1) down.classList.add('disabled'); } }
    function moveUp(){ if(selectedIndex>0){ [items[selectedIndex-1],items[selectedIndex]]=[items[selectedIndex],items[selectedIndex-1]]; selectedIndex--; renderTable(); } }
    function moveDown(){ if(selectedIndex<items.length-1){ [items[selectedIndex+1],items[selectedIndex]]=[items[selectedIndex],items[selectedIndex+1]]; selectedIndex++; renderTable(); } }
    function deleteSelected(){ if(selectedIndex>=0 && confirm(`删除「${items[selectedIndex].name}」?`)){ items.splice(selectedIndex,1); selectedIndex=items.length?Math.min(selectedIndex,items.length-1):-1; renderTable(); } }
    function addManual(){ let name=document.getElementById('prodName').value.trim(); if(!name){ alert("请输入商品名称"); return; } let unit=document.getElementById('prodUnit').value.trim()||"个"; let qty=parseFloat(document.getElementById('prodQty').value); if(isNaN(qty)||qty<=0){ alert("数量必须大于0"); return; } let price=parseFloat(document.getElementById('prodPrice').value); if(isNaN(price)||price<0){ alert("单价不能为负数"); return; } let remark=document.getElementById('prodRemark').value.trim(); items.push({name,unit,qty,price,remark}); if(items.length===1) selectedIndex=0; renderTable(); document.getElementById('prodName').value=''; document.getElementById('prodRemark').value=''; document.getElementById('prodUnit').value='个'; document.getElementById('prodQty').value='1'; document.getElementById('prodPrice').value='0.00'; }
    function clearAll(){ if(items.length && confirm('清空所有商品？')){ items=[]; selectedIndex=-1; renderTable(); } }
    function loadSelectedToForm(){ if(selectedIndex<0||!items[selectedIndex]){ alert('请先点击序号选中一个商品'); return; } const it=items[selectedIndex]; document.getElementById('prodName').value=it.name; document.getElementById('prodUnit').value=it.unit; document.getElementById('prodQty').value=it.qty; document.getElementById('prodPrice').value=it.price; document.getElementById('prodRemark').value=it.remark||''; }
    function saveEditToSelected(){ if(selectedIndex<0||!items[selectedIndex]){ alert('请先选中要修改的商品'); return; } let name=document.getElementById('prodName').value.trim(); if(!name){ alert("商品名称不能为空"); return; } let unit=document.getElementById('prodUnit').value.trim()||"个"; let qty=parseFloat(document.getElementById('prodQty').value); if(isNaN(qty)||qty<=0){ alert("数量必须大于0"); return; } let price=parseFloat(document.getElementById('prodPrice').value); if(isNaN(price)||price<0){ alert("单价不能为负数"); return; } let remark=document.getElementById('prodRemark').value.trim(); items[selectedIndex]={name,unit,qty,price,remark}; renderTable(); alert(`商品「${name}」已修改`); }
    
    // 批量解析
    function extractPrice(text){ let match=text.match(/(\d+(?:\.\d{1,2})?)\s*元?\s*$/); if(match) return {price:parseFloat(match[1]), rest:text.substring(0,match.index).trim()}; return null; }
    function extractQuantityUnitFromEnd(text){ let patterns=[/(\d+(?:\.\d+)?)\s*([a-zA-Z\u4e00-\u9fa5]{1,4})$/, /([一二两三四五六七八九十]+)\s*([a-zA-Z\u4e00-\u9fa5]{1,4})$/]; for(let p of patterns){ let match=text.match(p); if(match){ let qtyStr=match[1], unit=match[2]; let qty=1; if(/^\d+(?:\.\d+)?$/.test(qtyStr)) qty=parseFloat(qtyStr); else if(CHINESE_NUM_MAP[qtyStr]) qty=CHINESE_NUM_MAP[qtyStr]; if(qty>0 && STANDARD_UNITS.has(unit)){ let before=text.substring(0,match.index).trim(); if(before.length>0 && before.slice(-1).match(/[xX*]/)) continue; return {qty, unit, rest:before}; } } }
        let anyMatch=text.match(/(?:^|\s)(\d+(?:\.\d+)?)\s+([a-zA-Z\u4e00-\u9fa5]{1,4})(?=\s|$)/); if(anyMatch){ let qty=parseFloat(anyMatch[1]), unit=anyMatch[2]; if(qty>0 && STANDARD_UNITS.has(unit)){ let before=text.substring(0,anyMatch.index).trim(); let after=text.substring(anyMatch.index+anyMatch[0].length).trim(); return {qty,unit,rest:(before+' '+after).trim()}; } } return {qty:1, unit:'个', rest:text}; }
    function parseProductLine(line){ line=line.trim(); if(!line) return null; let priceInfo=extractPrice(line); if(!priceInfo) return null; let totalPrice=priceInfo.price; let remaining=priceInfo.rest; let {qty, unit, rest}=extractQuantityUnitFromEnd(remaining); let name=rest.trim(); if(!name) name="商品"; for(let u of STANDARD_UNITS) if(name.endsWith(u)){ name=name.substring(0,name.length-u.length).trim(); break; } if(name==="") name=rest; let unitPrice=totalPrice; if(qty>0) unitPrice=Math.round((totalPrice/qty)*100)/100; return {name, unit, qty:qty>0?qty:1, price:unitPrice}; }
    let parsedBuffer=[];
    function parseBatch(){ const raw=document.getElementById('batchRawInput').value; const lines=raw.split(/\r?\n/); let results=[]; for(let line of lines){ line=line.trim(); if(!line) continue; let parsed=parseProductLine(line); if(parsed) results.push(parsed); } parsedBuffer=results; const previewDiv=document.getElementById('parsePreview'); if(results.length===0) previewDiv.innerHTML='<div style="color:#e67e22;">⚠️ 未能识别有效商品</div>'; else previewDiv.innerHTML=results.map(p=>`<div class="preview-item">✅ ${p.name} &nbsp; ${p.qty}${p.unit} &nbsp; ¥${p.price.toFixed(2)} (小计: ${(p.qty*p.price).toFixed(2)})</div>`).join(''); return results; }
    function confirmAddBatch(){ if(parsedBuffer.length===0){ alert('没有解析成功的商品，请先点击“智能解析预览”'); return; } for(let prod of parsedBuffer) items.push({...prod, remark:''}); if(items.length>0 && selectedIndex===-1) selectedIndex=0; renderTable(); parsedBuffer=[]; document.getElementById('parsePreview').innerHTML='<div style="color:#2e7d64;">✅ 已成功添加</div>'; document.getElementById('batchRawInput').value=''; }
    
    // 导出图片/PDF/打印 - 清除所有选中高亮后导出
    function getCleanClone() {
        const original = document.getElementById('invoiceContainer');
        const clone = original.cloneNode(true);
        // 移除编辑备注按钮（避免导出按钮）
        const editBtn = clone.querySelector('#editRemarkBtn');
        if (editBtn) editBtn.remove();
        // 清除所有选中的行高亮（selected-row 类）
        const selectedRows = clone.querySelectorAll('.selected-row');
        selectedRows.forEach(row => {
            row.classList.remove('selected-row');
        });
        // 同时清除可能存在的拖拽类样式（不影响显示但为了干净）
        const draggingElements = clone.querySelectorAll('.dragging');
        draggingElements.forEach(el => el.classList.remove('dragging'));
        return clone;
    }
    
    async function saveImage(){ 
        const btn=document.getElementById('saveAsImageBtn'), orig=btn.innerText; 
        btn.innerText='生成中...'; btn.disabled=true; 
        try{ 
            const clone=getCleanClone(); 
            clone.style.position='absolute'; 
            clone.style.top='-9999px'; 
            clone.style.left='-9999px'; 
            clone.style.width=document.getElementById('invoiceContainer').offsetWidth+'px'; 
            document.body.appendChild(clone); 
            const canvas=await html2canvas(clone,{scale:3,backgroundColor:'#fff',logging:false}); 
            document.body.removeChild(clone); 
            const link=document.createElement('a'); 
            link.download=`销售单_${document.getElementById('invoiceNo').innerText}.png`; 
            link.href=canvas.toDataURL(); 
            link.click(); 
        }catch(e){ alert('生成图片失败'); }finally{ btn.innerText=orig; btn.disabled=false; } 
    }
    
    async function downloadPDF(){ 
        const btn=document.getElementById('downloadPdfBtn'), orig=btn.innerText; 
        btn.innerText='生成PDF...'; btn.disabled=true; 
        try{ 
            const clone=getCleanClone(); 
            clone.style.position='absolute'; 
            clone.style.top='-9999px'; 
            clone.style.width=document.getElementById('invoiceContainer').offsetWidth+'px'; 
            document.body.appendChild(clone); 
            const canvas=await html2canvas(clone,{scale:3,backgroundColor:'#fff',logging:false}); 
            document.body.removeChild(clone); 
            const imgData=canvas.toDataURL('image/png'), {jsPDF}=window.jspdf; 
            const imgW=canvas.width, imgH=canvas.height, pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'}); 
            const pdfW=pdf.internal.pageSize.getWidth(), pdfH=pdf.internal.pageSize.getHeight(), ratio=pdfW/imgW, imgHmm=imgH*ratio; 
            if(imgHmm<=pdfH) pdf.addImage(imgData,'PNG',0,0,pdfW,imgHmm); 
            else{ 
                let remain=imgHmm, curY=0; 
                while(remain>0){ 
                    let sliceH=Math.min(pdfH,remain), sliceCanvas=document.createElement('canvas'), sliceW=imgW, sliceHpx=sliceH/ratio; 
                    sliceCanvas.width=sliceW; sliceCanvas.height=sliceHpx; 
                    sliceCanvas.getContext('2d').drawImage(canvas,0,curY,sliceW,sliceHpx,0,0,sliceW,sliceHpx); 
                    pdf.addImage(sliceCanvas.toDataURL(),'PNG',0,0,pdfW,sliceH); 
                    remain-=sliceH; curY+=sliceHpx; 
                    if(remain>0) pdf.addPage(); 
                } 
            } 
            pdf.save(`销售单_${document.getElementById('invoiceNo').innerText}.pdf`); 
        }catch(e){ alert('PDF生成失败'); }finally{ btn.innerText=orig; btn.disabled=false; } 
    }
    
    async function printInvoice(){ 
        const btn=document.getElementById('printBtn'), orig=btn.innerText; 
        btn.innerText='准备打印...'; btn.disabled=true; 
        try{ 
            const clone=getCleanClone(); 
            const win=window.open('','_blank'); 
            if(!win){ alert('请允许弹窗'); return; } 
            clone.style.width='100%'; 
            clone.style.margin='0 auto'; 
            const styles=Array.from(document.styleSheets).reduce((acc,s)=>{ 
                try{ const rules=s.cssRules||s.rules; if(rules) for(let r of rules) acc+=r.cssText; }catch(e){} 
                return acc; 
            },''); 
            win.document.write(`<!DOCTYPE html><html><head><title>销售单打印</title><style>${styles} .control-panel, .btn-group, .remark-box button { display:none; }</style></head><body><div style="max-width:1280px;margin:0 auto;">${clone.outerHTML}</div></body></html>`); 
            win.document.close(); 
            win.onload=()=>win.print(); 
        }catch(e){ alert('打印失败'); }finally{ btn.innerText=orig; btn.disabled=false; } 
    }
    
    function initRemark(){ document.getElementById('editRemarkBtn').onclick=()=>{ let v=prompt("编辑备注",document.getElementById('remarkText').innerText); if(v!==null){ document.getElementById('remarkText').innerText=v.trim()||"—"; saveToLocalStorage(); } }; }
    function bindEvents(){ 
        document.getElementById('addItemBtn').addEventListener('click',addManual); 
        document.getElementById('clearAllBtn').addEventListener('click',clearAll); 
        document.getElementById('saveAsImageBtn').addEventListener('click',saveImage); 
        document.getElementById('downloadPdfBtn').addEventListener('click',downloadPDF); 
        document.getElementById('printBtn').addEventListener('click',printInvoice); 
        document.getElementById('moveUpBtn').addEventListener('click',moveUp); 
        document.getElementById('moveDownBtn').addEventListener('click',moveDown); 
        document.getElementById('deleteSelectedBtn').addEventListener('click',deleteSelected); 
        document.getElementById('loadEditBtn').addEventListener('click',loadSelectedToForm); 
        document.getElementById('saveEditBtn').addEventListener('click',saveEditToSelected); 
        document.getElementById('parseBtn').addEventListener('click',()=>parseBatch()); 
        document.getElementById('confirmAddBatchBtn').addEventListener('click',confirmAddBatch); 
        bindInfoEdits(); 
    }
    
    function init(){ 
        setInvoiceMeta(); 
        initRemark(); 
        bindEvents(); 
        const hasCache = loadFromLocalStorage();
        if (!hasCache || items.length === 0) {
            items.push({ name: "示例商品", unit: "个", qty: 1, price: 0.00, remark: "" });
            selectedIndex = 0;
            renderTable();
        } else {
            syncEditableInfo();
            renderTable();
        }
    }
    init();
</script>
